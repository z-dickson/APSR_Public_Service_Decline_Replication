# Conda environment for the replication package.
#
# Create the environment with:
#   conda env create -f environment.yml
#   conda activate nhs_replication
#
# Then download the spaCy English model:
#   python -m spacy download en_core_web_sm
#
# Python 3.11 is pinned because several C-extension dependencies (spaCy, blis)
# do not have pre-built wheels for Python 3.13+, and compilation from source
# frequently fails. Python 3.11 and 3.12 both work; 3.11 is pinned here for
# maximum compatibility.

name: nhs_replication
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - pandas>=2.2.2
    - numpy>=1.26.4
    - polars>=1.25.2
    - scipy>=1.13.1
    - plotly>=5.24.1
    - kaleido>=0.2.1
    - requests>=2.32.3
    - geopandas>=1.1.3
    - matplotlib>=3.9.2
    - spacy>=3.8.14
    - openpyxl>=3.1.5
    - pyarrow>=16.1.0
